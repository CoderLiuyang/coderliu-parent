server:
  port: 10020

spring:
  application:
    name: coderliu-admin
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.42.128:8848
        cluster-name: ly
        namespace: e174206d-c874-4973-babe-065958e62a6e
    sentinel:
      transport:
        #指定控制台的地址
        dashboard: 192.168.42.128:8080
ribbon:
  eager-load:
    clients: coderliu-business

logging:
  level:
    cn.coderliu.client.BusinessFeignClient: debug
feign:
  client:
  httpclient:
    config:
      #全局配置
      default:
        loggerLevel: basic
    max-connections: 200
    #单个路径
    max-connections-per-route: 50
    enabled: true
